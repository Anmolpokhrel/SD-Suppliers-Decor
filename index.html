<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SD Suppliers & Decore — Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: rgba(255,255,255,0.07);
    --accent: #c8a96e;
    --accent2: #7b6cf6;
    --text: #f0ede8;
    --muted: rgba(240,237,232,0.45);
    --fb: #1877F2;
    --ig: #bc1888;
    --web: #2ed8a3;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 0;
  }

  .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .orb1 { width: 500px; height: 500px; background: rgba(123,108,246,0.12); top: -150px; right: -100px; }
  .orb2 { width: 400px; height: 400px; background: rgba(200,169,110,0.08); bottom: 0; left: -100px; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* ── profile ── */
  .profile {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.7s 0.1s both;
  }

  .avatar {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: #fff;
    margin-bottom: 1rem;
    position: relative;
    animation: float 6s ease-in-out infinite;
  }
  .avatar::after {
    content: '';
    position: absolute; inset: -3px;
    border-radius: 50%;
    background: conic-gradient(var(--accent2), var(--accent), transparent, var(--accent2));
    z-index: -1;
    animation: spin 8s linear infinite;
  }

  .profile h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 0.4rem;
  }
  .profile h1 em { font-style: italic; color: var(--accent); }

  .profile p {
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* ── links ── */
  #links-section {
    position: relative; z-index: 1;
    width: 100%; max-width: 460px;
  }

  .section-label {
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.2rem;
    display: block;
    text-align: center;
    animation: fadeUp 0.7s 0.3s both;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    text-decoration: none;
    color: var(--text);
    margin-bottom: 12px;
    transition: background 0.25s, border-color 0.25s, transform 0.2s;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.6s forwards;
  }
  .link-btn:nth-child(2) { animation-delay: 0.4s; }
  .link-btn:nth-child(3) { animation-delay: 0.55s; }
  .link-btn:nth-child(4) { animation-delay: 0.7s; }

  .link-btn::after {
    content: '↗';
    position: absolute; right: 1.25rem;
    color: var(--muted);
    font-size: 1rem;
    transition: transform 0.2s, color 0.2s;
  }
  .link-btn:hover { transform: translateX(5px); }
  .link-btn:hover::after { transform: translate(2px,-2px); color: var(--text); }

  .link-btn.fb  { border-color: rgba(24,119,242,0.25); }
  .link-btn.fb:hover  { background: rgba(24,119,242,0.08); border-color: var(--fb); }
  .link-btn.ig  { border-color: rgba(188,24,136,0.25); }
  .link-btn.ig:hover  { background: rgba(188,24,136,0.08); border-color: var(--ig); }
  .link-btn.web { border-color: rgba(46,216,163,0.25); }
  .link-btn.web:hover { background: rgba(46,216,163,0.08); border-color: var(--web); }

  .link-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .link-icon svg { width: 20px; height: 20px; }
  .link-icon.fb  { background: rgba(24,119,242,0.14); }
  .link-icon.ig  { background: rgba(188,24,136,0.14); }
  .link-icon.web { background: rgba(46,216,163,0.12); }

  .link-info { text-align: left; }
  .link-info strong { display: block; font-weight: 500; font-size: 0.94rem; }
  .link-info span { font-size: 0.76rem; color: var(--muted); }

  /* ── footer ── */
  footer {
    position: relative; z-index: 1;
    margin-top: 2.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    animation: fadeUp 0.7s 0.9s both;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="profile">
  <div class="avatar">A</div>
  <h1>SD<em>suppliers & Decor</em></h1>
  <p>Connect with us &amp; Social Links</p>
</div>

<section id="links-section">
  <span class="section-label">Quick Access</span>

  <a href="https://www.facebook.com/" target="_blank" rel="noopener" class="link-btn fb">
    <div class="link-icon fb">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1877F2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
      </svg>
    </div>
    <div class="link-info">
      <strong>Facebook</strong>
      <span>facebook.com</span>
    </div>
  </a>

  <a href="https://www.facebook.com/" target="_blank" rel="noopener" class="link-btn ig">
    <div class="link-icon ig">
      <svg viewBox="0 0 24 24" fill="none" stroke="#bc1888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
      </svg>
    </div>
    <div class="link-info">
      <strong>Instagram</strong>
      <span>instagram.com</span>
    </div>
  </a>

  <a href="https://www.pokhrelanmol.com.np" target="_blank" rel="noopener" class="link-btn web">
    <div class="link-icon web">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2ed8a3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    </div>
    <div class="link-info">
      <strong>Personal Website</strong>
      <span>pokhrelanmol.com.np</span>
    </div>
  </a>
</section>

<footer>
  © 2025 SD suppliers & Decor &nbsp;·&nbsp; <a href="https://www.pokhrelanmol.com.np" target="_blank">www.sdsuppliers.com.np</a>
</footer>

</body>
</html>
